<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 权威简报</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
  h1 { color: #1a1a1a; font-size: 22px; border-bottom: 3px solid #0066cc; padding-bottom: 10px; }
  .date { color: #666; font-size: 13px; margin-bottom: 20px; }
  .section { background: #fff; border-radius: 10px; padding: 18px; margin-bottom: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .section h2 { font-size: 16px; color: #0066cc; margin: 0 0 14px 0; padding-bottom: 8px; border-bottom: 1px solid #e0e0e0; }
  .item { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #f0f0f0; }
  .item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .item-title { font-weight: bold; font-size: 15px; color: #1a1a1a; margin-bottom: 6px; }
  .item-summary { font-size: 14px; color: #444; line-height: 1.6; margin-bottom: 6px; }
  .item-source { font-size: 13px; }
  .item-source a { color: #0066cc; text-decoration: none; background: #f0f7ff; padding: 2px 8px; border-radius: 4px; }
  .item-source a:hover { text-decoration: underline; background: #dceeff; }
  .no-update { color: #999; font-style: italic; text-align: center; padding: 16px; background: #fafafa; border-radius: 6px; }
  .footer { text-align: center; color: #aaa; font-size: 12px; margin-top: 20px; padding-top: 12px; border-top: 1px solid #e0e0e0; }
  .conclusion { background: #fff; border-left: 4px solid #0066cc; padding: 14px 18px; margin-top: 10px; border-radius: 0 8px 8px 0; }
  .conclusion-title { font-weight: bold; color: #0066cc; margin-bottom: 6px; }
  .conclusion-text { font-size: 14px; color: #333; line-height: 1.6; }
</style>
</head>
<body>
<h1>🤖 AI 权威简报</h1>
<div class="date">📅 日期：占位页面</div>

<div class="section">
  <h2>🌍 海外动态</h2>
  <div class="no-update">今日无重大更新</div>
</div>

<div class="section">
  <h2>🇨🇳 国内动态</h2>
  <div class="no-update">今日无重大更新</div>
</div>

<div class="section">
  <h2>📌 今日判断</h2>
  <div class="conclusion">
    <div class="conclusion-title">简要结论</div>
    <div class="conclusion-text">等待明日 07:00 首次自动生成</div>
  </div>
</div>

<div class="footer">由 AI 自动抓取权威来源生成 · 点击来源链接查看原文</div>
</body>
</html>
